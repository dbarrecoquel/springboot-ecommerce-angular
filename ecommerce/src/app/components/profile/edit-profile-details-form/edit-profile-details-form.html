    <div class="form-container">
        <form [formGroup]="profileForm" (ngSubmit)="submit()" class="form">
            <h2>Modifier les informations de votre profil</h2>
            <div class="form-group">
                <label for="firstName">Prénom</label>
                <input type="text" formControlName="firstName" id="firstName" />
            </div>
            <div class="error" *ngIf="profileForm.get('firstName')?.touched && profileForm.get('firstName')?.invalid">
                Le prénom est requis
            </div>
            <div class="form-group">
                <label for="lastName">Nom</label>
                <input type="text" formControlName="lastName" id="lastName" />
            </div>
            <div class="error" *ngIf="profileForm.get('lastName')?.touched && profileForm.get('lastName')?.invalid">
                Le nom est requis
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" formControlName="email" id="email" />
            </div>
            <div class="error" *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.invalid">
                L'email est requis
            </div>
            <div class="form-group">
                <label for="phone">Téléphone</label>
                <input type="tel" formControlName="phone" id="phone" />
            </div>
            <div class="error" *ngIf="profileForm.get('phone')?.touched && profileForm.get('phone')?.invalid">
                Le téléphone est requis
            </div>
            <div class="error" *ngIf="profileForm.get('phone')?.touched && profileForm.get('phone')?.invalid">
                Le téléphone doit contenir 10 chiffres
            </div>
            <div class="actions">
                <button type="submit" [disabled]="profileForm.invalid">Enregistrer</button>
                <button type="button" (click)="cancel()" class="secondary">Annuler</button>
            </div>
        </form>
    </div>
