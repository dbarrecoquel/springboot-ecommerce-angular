<div class="form-container">
    <form [formGroup]="addressForm" (ngSubmit)="submit()" class="form">
  
      <h2>
        {{ isEdit ? 'Modifier adresse' : 'Nouvelle adresse' }}
      </h2>
  
      <div class="form-group">
        <label>Type</label>
        <select formControlName="addressType">
          <option value="">Choisir</option>
          <option value="BILLING">Facturation</option>
          <option value="SHIPPING">Livraison</option>
        </select>
      </div>
  
      <div class="form-group">
        <label>Libellé</label>
        <input type="text" formControlName="label" />
      </div>
  
      <div class="form-group">
        <label>Adresse</label>
        <input type="text" formControlName="street" />
      </div>
  
      <div class="form-group">
        <label>Complément</label>
        <input type="text" formControlName="complement" />
      </div>
  
      <div class="form-row">
        <input type="text" formControlName="postalCode" placeholder="Code postal" />
        <input type="text" formControlName="city" placeholder="Ville" />
      </div>
  
      <div class="form-group">
        <input type="text" formControlName="country" placeholder="Pays" />
      </div>
  
      <div class="actions">
        <button type="submit" [disabled]="addressForm.invalid">
          Enregistrer
        </button>
  
        <button type="button" (click)="cancel()" class="secondary">
          Annuler
        </button>
      </div>
  
    </form>
  </div>
