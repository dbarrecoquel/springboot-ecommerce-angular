<nav aria-label="Pagination" class="pagination-container" *ngIf="totalPages > 0">
    <ul class="pagination">
      
      <!-- First page -->
      <li class="page-item" [class.disabled]="isFirstPage()">
        <button class="page-link" (click)="first()" [disabled]="isFirstPage()">
          <i class="bi bi-chevron-bar-left"></i>
        </button>
      </li>
      
      <!-- Previous page -->
      <li class="page-item" [class.disabled]="isFirstPage()">
        <button class="page-link" (click)="prev()" [disabled]="isFirstPage()">
          <i class="bi bi-chevron-left"></i>
        </button>
      </li>
      
      <!-- Ellipsis left -->
      <li class="page-item disabled" *ngIf="visiblePages[0] > 0">
        <span class="page-link">...</span>
      </li>
      
      <!-- Page numbers avec trackBy -->
      <li class="page-item" 
          *ngFor="let p of visiblePages; trackBy: trackByPage"
          [class.active]="isActivePage(p)">
        <button class="page-link" (click)="goTo(p)">
          {{ displayPage(p) }}
        </button>
      </li>
      
      <!-- Ellipsis right -->
      <li class="page-item disabled" *ngIf="visiblePages[visiblePages.length - 1] < totalPages - 1">
        <span class="page-link">...</span>
      </li>
      
      <!-- Next page -->
      <li class="page-item" [class.disabled]="isLastPage()">
        <button class="page-link" (click)="next()" [disabled]="isLastPage()">
          <i class="bi bi-chevron-right"></i>
        </button>
      </li>
      
      <!-- Last page -->
      <li class="page-item" [class.disabled]="isLastPage()">
        <button class="page-link" (click)="last()" [disabled]="isLastPage()">
          <i class="bi bi-chevron-bar-right"></i>
        </button>
      </li>
      
    </ul>
    
    <!-- Info -->
    <div class="pagination-info">
      Page {{ displayPage(page) }} sur {{ totalPages }}
    </div>
  </nav>
