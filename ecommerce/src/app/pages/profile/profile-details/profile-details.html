<app-profile-navigation></app-profile-navigation>

<div class="profile-container" *ngIf="user$ | async as user">

  <div class="profile-card">

    <!-- Header -->
    <div class="profile-header">
      <div class="avatar">
        {{ user.firstName?.charAt(0) }}{{ user.lastName?.charAt(0) }}
      </div>

      <div>
        <h2>{{ user.firstName }} {{ user.lastName }}</h2>
        <p class="email">{{ user.email }}</p>
      </div>
    </div>

    <!-- Infos -->
    <div class="profile-info">

      <div class="info-item">
        <span class="label">Prénom</span>
        <span class="value">{{ user.firstName }}</span>
      </div>

      <div class="info-item">
        <span class="label">Nom</span>
        <span class="value">{{ user.lastName }}</span>
      </div>

      <div class="info-item">
        <span class="label">Email</span>
        <span class="value">{{ user.email }}</span>
      </div>

      <div class="info-item">
        <span class="label">Téléphone</span>
        <span class="value">{{ user.phone || 'Non renseigné' }}</span>
      </div>

    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <button class="btn-primary">Modifier</button>
      <button class="btn-secondary">Changer mot de passe</button>
    </div>

  </div>

</div>
