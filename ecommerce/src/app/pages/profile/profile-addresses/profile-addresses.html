<div class="addresses-container">
  
    <!-- Header avec bouton Ajouter -->
    <div class="addresses-header">
      <h2>Mes adresses</h2>
      <button class="btn btn-primary" (click)="add()">
        <i class="bi bi-plus-circle"></i> Ajouter une adresse
      </button>
    </div>
    
    <!-- Loading -->
    <div class="loading" *ngIf="userStore.isLoading()">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>
    
    <!-- Liste vide -->
    <div class="empty-state" *ngIf="userStore.addressesLoaded$() && userStore.addressesList().length === 0">
      <i class="bi bi-house"></i>
      <p>Aucune adresse enregistrée</p>
      <button class="btn btn-primary" (click)="add()">
        Ajouter votre première adresse
      </button>
    </div>
    
    <!-- Liste des adresses -->
    <div class="addresses-grid" *ngIf="!userStore.isLoading() && userStore.addressesList().length > 0">
      <div *ngFor="let address of userStore.addressesList()" class="address-card">
        
        <div class="card-header">
          <strong>{{ address.label }}</strong>
          <span class="badge" [class.badge-billing]="address.addressType === 'BILLING'"
                              [class.badge-shipping]="address.addressType === 'SHIPPING'">
            {{ address.addressType === 'BILLING' ? 'Facturation' : 'Livraison' }}
          </span>
        </div>
        
        <div class="card-body">
          <p>{{ address.street }}</p>
          <p *ngIf="address.complement">{{ address.complement }}</p>
          <p>{{ address.postalCode }} {{ address.city }}</p>
          <p>{{ address.country }}</p>
        </div>
        
        <div class="card-footer">
          <button class="btn btn-outline-primary btn-sm" (click)="edit(address)">
            <i class="bi bi-pencil"></i> Modifier
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="delete(address)">
            <i class="bi bi-trash"></i> Supprimer
          </button>
        </div>
        
      </div>
    </div>
    
  </div>
