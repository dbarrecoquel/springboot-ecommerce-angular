<div class="products-section" *ngIf="store.products() as products">
    <h1 class="section-title">Produits</h1>
    
    <!-- Loading -->
    <div class="loading-container" *ngIf="store.isLoading()">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>
    
    <!-- No products -->
    <div class="no-products" *ngIf="!store.isLoading() && products.length === 0">
      <i class="bi bi-inbox"></i>
      <p>Aucun produit dans cette catégorie pour le moment</p>
    </div>
    
    <!-- Products Grid -->
    <div *ngIf="!store.isLoading() && products.length > 0">
      <div class="products-grid">
        <div class="product-card" *ngFor="let product of products">
          <app-product-item [product]="product" [catId]="categoryId"></app-product-item>
        </div>
      </div>
      
      <!-- Pagination -->
      <app-pagination
        [page]="store.page()"
        [totalPages]="store.totalPages()"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </div>
  </div>
